<!doctype html>
<!-- @dsCard group="UI Kit — Marketing Site" name="Marketing site — Home" subtitle="Click-thru recreation of dashboardlabs.ca" viewport="1280x820" -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Dashboard Labs — Marketing Site UI Kit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="site.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="app"></div>

  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="ServicesGrid.jsx"></script>
  <script type="text/babel" src="PortfolioStrip.jsx"></script>
  <script type="text/babel" src="BadgeStrip.jsx"></script>
  <script type="text/babel" src="ContactForm.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [page, setPage] = useState('home');

      // refresh Lucide whenever the page composition changes
      useEffect(() => {
        const t = setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
        return () => clearTimeout(t);
      }, [page]);

      const go = (id) => {
        setPage(id);
        window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
      };

      return (
        <>
          <Header active={page} onNav={go} />
          <main>
            {page === 'home' && (
              <>
                <Hero onPrimary={() => go('services')} onSecondary={() => go('portfolio')} />
                <ServicesGrid onSelect={() => go('services')} />
                <PortfolioStrip />
                <BadgeStrip />
              </>
            )}
            {page === 'services'  && <ServicesPage  onContact={() => go('contact')} />}
            {page === 'portfolio' && <PortfolioStrip />}
            {page === 'embedded'  && <EmbeddedPage  onContact={() => go('contact')} />}
            {page === 'blog'      && <BlogPage />}
            {page === 'contact'   && <ContactForm  />}
          </main>
          <Footer />
        </>
      );
    }

    function ServicesPage({ onContact }) {
      return (
        <>
          <section style={{ background: 'var(--bg-brand-soft)', padding: '80px 28px 40px' }}>
            <div style={{ maxWidth: 880, margin: '0 auto', textAlign: 'center' }}>
              <span className="dl-eyebrow">— What we do</span>
              <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 56, fontWeight: 800,
                            letterSpacing: '-0.02em', lineHeight: 1.05, color: 'var(--fg-brand)',
                            margin: '0 0 16px' }}>
                Our Services
              </h1>
              <p style={{ color: 'var(--fg2)', fontSize: 18, lineHeight: 1.6, margin: 0 }}>
                Learn how we can help you and your business access, visualize and read your data. If you need
                anything that is not covered here, reach out to us.
              </p>
            </div>
          </section>
          <ServicesGrid onSelect={onContact} />
          <BadgeStrip />
        </>
      );
    }

    function EmbeddedPage({ onContact }) {
      return (
        <section style={{ padding: '96px 28px' }}>
          <div style={{ maxWidth: 1000, margin: '0 auto', display: 'grid',
                        gridTemplateColumns: '1.05fr 1fr', gap: 56, alignItems: 'center' }}>
            <div>
              <span className="dl-eyebrow">— Power Embedded</span>
              <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 48, fontWeight: 800,
                            letterSpacing: '-0.02em', lineHeight: 1.1, color: 'var(--fg-brand)',
                            margin: '6px 0 16px' }}>
                Bring Power BI into your own product.
              </h1>
              <p style={{ color: 'var(--fg2)', fontSize: 17, lineHeight: 1.6 }}>
                We build Power BI Embedded experiences that live inside your customer-facing apps — branded
                to look like yours, secured with row-level access, and supported end-to-end so your team
                doesn't have to become BI specialists.
              </p>
              <ul style={{ paddingLeft: 18, color: 'var(--fg2)', lineHeight: 1.8, fontSize: 15 }}>
                <li>White-labelled to your product's design</li>
                <li>Row-level security per customer tenant</li>
                <li>Capacity sizing &amp; cost management</li>
                <li>Embed in React, Angular, Vue, or server-rendered apps</li>
              </ul>
              <button className="dl-btn dl-btn--primary dl-btn--lg" onClick={onContact}
                      style={{ marginTop: 8 }}>
                Talk to us
              </button>
            </div>
            <div style={{ background: 'var(--bg-brand-soft)', borderRadius: 16, padding: 28,
                          border: '1px solid var(--border)' }}>
              <div style={{ background: 'white', borderRadius: 12, padding: 16,
                            border: '1px solid var(--border)', boxShadow: 'var(--shadow-sm)' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                              marginBottom: 12 }}>
                  <strong style={{ fontFamily: 'var(--font-display)', color: 'var(--fg-brand)',
                                   fontSize: 14 }}>Your app · Customer dashboard</strong>
                  <span className="dl-tag">Embedded</span>
                </div>
                <svg viewBox="0 0 360 160" style={{ width: '100%', height: 160 }}>
                  {[60,30,80,18,42,12].map((y,i) => (
                    <rect key={i} x={20 + i*55} y={y} width={36} height={160-y} rx={3}
                          fill={['#4FB8D9','#137FA3','#C3F1DD','#29C99B','#1F9F66','#0E2747'][i]} />
                  ))}
                </svg>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function BlogPage() {
      const posts = [
        { tag: 'Power BI',  title: 'How to design a one-page weekly sales review', mins: 6 },
        { tag: 'Retail',    title: 'Five KPIs every grocery category manager should track', mins: 8 },
        { tag: 'Automation',title: 'When (and when not) to automate your Excel workflow', mins: 5 },
        { tag: 'Training',  title: 'A four-week curriculum to onboard your team to Power BI', mins: 10 },
      ];
      return (
        <section style={{ padding: '80px 28px' }}>
          <div className="dl-section-head">
            <span className="dl-eyebrow">— Blog &amp; Portfolio</span>
            <h2 className="dl-section-title">From the practice</h2>
            <p className="dl-section-lede">
              Field notes from real client engagements — frameworks, templates, and the occasional opinion.
            </p>
          </div>
          <div style={{ maxWidth: 1100, margin: '0 auto', display: 'grid',
                        gridTemplateColumns: 'repeat(2, 1fr)', gap: 20 }}>
            {posts.map((p, i) => (
              <article key={i} style={{ background: 'white', border: '1px solid var(--border)',
                                         borderRadius: 14, overflow: 'hidden', boxShadow: 'var(--shadow-xs)' }}>
                <div style={{ height: 140, background: `var(--gradient-${i % 2 ? 'cool' : 'mint'})`,
                              display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <i data-lucide={['bar-chart-3','shopping-cart','cpu','graduation-cap'][i]}
                     style={{ width: 38, height: 38, color: 'var(--dl-navy-900)', opacity: 0.7 }} />
                </div>
                <div style={{ padding: 20 }}>
                  <span className="dl-tag">{p.tag}</span>
                  <h3 style={{ fontFamily: 'var(--font-display)', fontSize: 19, fontWeight: 700,
                                color: 'var(--fg-brand)', margin: '10px 0 8px', lineHeight: 1.3 }}>
                    {p.title}
                  </h3>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ color: 'var(--fg3)', fontSize: 13 }}>{p.mins} min read</span>
                    <a style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 13,
                                 color: 'var(--dl-blue-600)', display: 'inline-flex', alignItems: 'center',
                                 gap: 4 }}>
                      Read <i data-lucide="arrow-right" style={{ width: 13, height: 13 }} />
                    </a>
                  </div>
                </div>
              </article>
            ))}
          </div>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
