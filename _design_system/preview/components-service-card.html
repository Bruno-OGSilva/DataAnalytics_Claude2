<!doctype html>
<!-- @dsCard group="Components" name="Service card" subtitle="Feature tile w/ gradient stripe + icon" viewport="700x230" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest"></script></head><body>
<div class="card">
  <div class="meta">Service card · feature tile</div>
  <div class="row" style="gap:14px">
    <div style="flex:1;background:white;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm)">
      <div style="height:4px;background:var(--gradient-brand)"></div>
      <div style="padding:18px">
        <div style="width:44px;height:44px;border-radius:10px;background:#E8F8F2;display:flex;align-items:center;justify-content:center;color:var(--dl-green-600);margin-bottom:14px"><i data-lucide="bar-chart-3" style="width:22px;height:22px"></i></div>
        <div style="font-family:var(--font-display);font-weight:700;color:var(--fg-brand);font-size:18px;margin-bottom:6px">Data Visualization</div>
        <div style="color:var(--fg2);font-size:13.5px;line-height:1.5">Transform complex databases into actionable insights and easy-to-use dashboards.</div>
      </div>
    </div>
    <div style="flex:1;background:white;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm)">
      <div style="height:4px;background:var(--gradient-brand)"></div>
      <div style="padding:18px">
        <div style="width:44px;height:44px;border-radius:10px;background:#E4F4FB;display:flex;align-items:center;justify-content:center;color:var(--dl-blue-600);margin-bottom:14px"><i data-lucide="cpu" style="width:22px;height:22px"></i></div>
        <div style="font-family:var(--font-display);font-weight:700;color:var(--fg-brand);font-size:18px;margin-bottom:6px">Process Automation</div>
        <div style="color:var(--fg2);font-size:13.5px;line-height:1.5">Save time and energy by automating simple and repetitive processes.</div>
      </div>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script></body></html>
