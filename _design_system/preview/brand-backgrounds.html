<!doctype html>
<!-- @dsCard group="Brand" name="Surface patterns" subtitle="White / mint / navy / gradient" viewport="700x200" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest"></script></head><body>
<div class="card">
  <div class="meta">Surface patterns</div>
  <div class="row" style="gap:14px">
    <div style="flex:1;height:120px;border-radius:12px;background:white;border:1px solid var(--border);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-display);font-size:11px;color:var(--fg3);font-weight:700;letter-spacing:0.06em;text-transform:uppercase">Default · white</div>
    <div style="flex:1;height:120px;border-radius:12px;background:var(--bg-brand-soft);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-display);font-size:11px;color:var(--dl-green-700);font-weight:700;letter-spacing:0.06em;text-transform:uppercase">Mint section · #EAF6F1</div>
    <div style="flex:1;height:120px;border-radius:12px;background:var(--dl-navy-900);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-display);font-size:11px;color:var(--dl-mint-300);font-weight:700;letter-spacing:0.06em;text-transform:uppercase">Inverse · navy 900</div>
    <div style="flex:1;height:120px;border-radius:12px;background:var(--gradient-brand);display:flex;align-items:flex-end;padding:10px;font-family:var(--font-display);font-size:11px;color:white;font-weight:700;letter-spacing:0.06em;text-transform:uppercase">Brand gradient</div>
  </div>
</div>
<script>lucide.createIcons();</script></body></html>
