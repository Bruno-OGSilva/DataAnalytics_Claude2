<!doctype html>
<!-- @dsCard group="Spacing" name="Border radius" subtitle="sm / md / lg / xl / 2xl / pill" viewport="700x190" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="meta">Border radius</div>
  <div class="row" style="gap:14px">
    
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="width:84px;height:84px;background:var(--bg-brand-soft);border:1px solid var(--border);border-radius:4px"></div>
        <div class="token">--radius-sm</div>
        <div class="value">4px</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="width:84px;height:84px;background:var(--bg-brand-soft);border:1px solid var(--border);border-radius:8px"></div>
        <div class="token">--radius-md</div>
        <div class="value">8px</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="width:84px;height:84px;background:var(--bg-brand-soft);border:1px solid var(--border);border-radius:12px"></div>
        <div class="token">--radius-lg</div>
        <div class="value">12px</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="width:84px;height:84px;background:var(--bg-brand-soft);border:1px solid var(--border);border-radius:18px"></div>
        <div class="token">--radius-xl</div>
        <div class="value">18px</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
        <div style="width:84px;height:84px;background:var(--bg-brand-soft);border:1px solid var(--border);border-radius:28px"></div>
        <div class="token">--radius-2xl</div>
        <div class="value">28px</div>
      </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
      <div style="width:130px;height:48px;background:var(--bg-brand-soft);border:1px solid var(--border);border-radius:999px"></div>
      <div class="token">--radius-pill</div>
      <div class="value">999</div>
    </div>
  </div>
</div>
</body></html>
