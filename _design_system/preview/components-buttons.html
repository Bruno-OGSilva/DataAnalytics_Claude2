<!doctype html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary / secondary / ghost / sizes" viewport="700x190" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest"></script></head><body>
<div class="card">
  <div class="meta">Buttons · primary / secondary / ghost · sizes</div>
  <div class="row" style="gap:12px;align-items:center;flex-wrap:wrap">
    <button style="background:var(--dl-green-600);color:white;border:0;font-family:var(--font-display);font-weight:600;font-size:15px;padding:12px 22px;border-radius:8px;cursor:pointer">Get a quote</button>
    <button style="background:white;color:var(--fg-brand);border:1.5px solid var(--dl-navy-900);font-family:var(--font-display);font-weight:600;font-size:15px;padding:11px 22px;border-radius:8px;cursor:pointer">Learn more</button>
    <button style="background:transparent;color:var(--dl-blue-600);border:0;font-family:var(--font-display);font-weight:600;font-size:15px;padding:11px 8px;cursor:pointer;display:inline-flex;align-items:center;gap:6px">Read article <i data-lucide="arrow-right" style="width:16px;height:16px"></i></button>
    <button style="background:var(--dl-navy-900);color:white;border:0;font-family:var(--font-display);font-weight:600;font-size:15px;padding:12px 22px;border-radius:8px;cursor:pointer">Contact us</button>
  </div>
  <div class="row" style="gap:10px;align-items:center">
    <button style="background:var(--dl-green-600);color:white;border:0;font-family:var(--font-display);font-weight:600;font-size:13px;padding:8px 14px;border-radius:6px;cursor:pointer">Small</button>
    <button style="background:var(--dl-green-600);color:white;border:0;font-family:var(--font-display);font-weight:600;font-size:15px;padding:12px 22px;border-radius:8px;cursor:pointer">Default</button>
    <button style="background:var(--dl-green-600);color:white;border:0;font-family:var(--font-display);font-weight:600;font-size:17px;padding:16px 28px;border-radius:8px;cursor:pointer">Large</button>
  </div>
</div>
<script>lucide.createIcons();</script></body></html>
