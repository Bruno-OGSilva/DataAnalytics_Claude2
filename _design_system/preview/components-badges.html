<!doctype html>
<!-- @dsCard group="Components" name="Badges & tags" subtitle="Pills for category, certification, status" viewport="700x120" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest"></script></head><body>
