<!doctype html>
<!-- @dsCard group="Components" name="KPI card" subtitle="Dashboard cell — value + delta" viewport="700x160" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest"></script></head><body>
<div class="card">
  <div class="meta">KPI · dashboard cell</div>
  <div class="row" style="gap:12px">
    <div style="flex:1;background:white;border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow-xs)">
      <div style="font-family:var(--font-display);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--fg3);font-weight:700">Net sales</div>
      <div style="font-family:var(--font-mono);font-size:30px;font-weight:600;color:var(--fg-brand);margin-top:6px">$1.28M</div>
      <div style="display:flex;align-items:center;gap:4px;color:var(--dl-green-600);font-family:var(--font-display);font-weight:600;font-size:13px;margin-top:2px"><i data-lucide="trending-up" style="width:14px;height:14px"></i>+12.4%</div>
    </div>
    <div style="flex:1;background:white;border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow-xs)">
      <div style="font-family:var(--font-display);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--fg3);font-weight:700">Avg basket</div>
      <div style="font-family:var(--font-mono);font-size:30px;font-weight:600;color:var(--fg-brand);margin-top:6px">$42.10</div>
      <div style="display:flex;align-items:center;gap:4px;color:var(--danger);font-family:var(--font-display);font-weight:600;font-size:13px;margin-top:2px"><i data-lucide="trending-down" style="width:14px;height:14px"></i>−1.8%</div>
    </div>
    <div style="flex:1;background:var(--dl-navy-900);color:white;border-radius:12px;padding:16px">
      <div style="font-family:var(--font-display);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--dl-mint-300);font-weight:700">Loyalty signups</div>
      <div style="font-family:var(--font-mono);font-size:30px;font-weight:600;color:white;margin-top:6px">8,412</div>
      <div style="display:flex;align-items:center;gap:4px;color:var(--dl-teal-400);font-family:var(--font-display);font-weight:600;font-size:13px;margin-top:2px"><i data-lucide="trending-up" style="width:14px;height:14px"></i>+22.1%</div>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script></body></html>
