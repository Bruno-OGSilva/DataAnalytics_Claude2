<!doctype html>
<!-- @dsCard group="Colors" name="Semantic colors" subtitle="Success / info / warning / danger + fg tokens" viewport="700x240" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="meta">Semantic colors · status</div>
  <div class="row">
    <div class="swatch" style="background:var(--success)"><div class="swatch-label">Success<span class="hex">--dl-green-600</span></div></div>
    <div class="swatch" style="background:var(--info)"><div class="swatch-label">Info<span class="hex">--dl-blue-500</span></div></div>
    <div class="swatch" style="background:var(--warning)"><div class="swatch-label">Warning<span class="hex">#E0A21A</span></div></div>
    <div class="swatch" style="background:var(--danger)"><div class="swatch-label">Danger<span class="hex">#D24A4A</span></div></div>
  </div>
  <div class="row" style="margin-top:4px">
    <div class="kv" style="grid-template-columns: 140px 1fr; padding:0; border:0; flex:1">
      <div><span class="label">--fg1</span></div><div style="color:var(--fg1)">Primary text on light</div>
    </div>
    <div class="kv" style="grid-template-columns: 140px 1fr; padding:0; border:0; flex:1">
      <div><span class="label">--fg2</span></div><div style="color:var(--fg2)">Secondary text</div>
    </div>
  </div>
</div>
</body></html>
