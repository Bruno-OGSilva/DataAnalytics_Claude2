<!doctype html>
<!-- @dsCard group="Components" name="Top navigation" subtitle="Sticky header w/ active state" viewport="700x130" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><script src="https://unpkg.com/lucide@latest"></script></head><body>
<div class="card">
  <div class="meta">Top navigation</div>
  <div style="background:white;border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:24px;box-shadow:var(--shadow-xs)">
    <div style="display:flex;align-items:center;gap:8px">
      <img src="../assets/logo-dark.png" style="height:30px;width:auto" />
      <div style="font-family:var(--font-display);font-weight:800;font-size:14px;letter-spacing:0.04em;color:var(--fg-brand)">DASHBOARD<br/><span style="color:var(--dl-green-600)">LABS</span></div>
    </div>
    <nav style="display:flex;gap:22px;font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--fg1);margin-left:8px">
      <a style="color:var(--fg-brand);border-bottom:2px solid var(--dl-green-600);padding-bottom:2px">Home</a>
      <a style="color:var(--fg2)">Services</a>
      <a style="color:var(--fg2)">Portfolio</a>
      <a style="color:var(--fg2)">Power Embedded</a>
      <a style="color:var(--fg2)">Blog</a>
    </nav>
    <div style="margin-left:auto">
      <button style="background:var(--dl-green-600);color:white;border:0;font-family:var(--font-display);font-weight:600;font-size:13px;padding:9px 16px;border-radius:7px;cursor:pointer">Contact</button>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script></body></html>
